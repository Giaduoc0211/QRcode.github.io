<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phát audio</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .box {
      width: min(92vw, 460px);
      text-align: center;
      padding: 24px;
      border-radius: 20px;
      background: #1b1b1b;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    h1 { margin-top: 0; }
    p { line-height: 1.5; opacity: .9; }
    button {
      font-size: 18px;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: #fff;
      color: #111;
      font-weight: 700;
      margin-top: 12px;
      display: none;
    }
    audio {
      width: 100%;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Mở audio</h1>
    <p id="status">Đang thử tự phát audio...</p>
    <button id="playBtn">Bấm để phát</button>
    <audio id="audio" autoplay playsinline controls>
      <source src="audio.aac" type="audio/aac" />
      Trình duyệt của bạn không hỗ trợ audio.
    </audio>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const status = document.getElementById('status');
    const playBtn = document.getElementById('playBtn');
    let started = false;
    let blocked = false;

    async function doPlay() {
      if (started) return true;
      try {
        await audio.play();
        started = true;
        status.textContent = 'Đang phát audio.';
        playBtn.style.display = 'none';
        return true;
      } catch (err) {
        return false;
      }
    }

    async function tryAutoPlay() {
      const ok = await doPlay();
      if (!ok) {
        blocked = true;
        status.textContent = 'Trình duyệt chặn tự phát.';
      }
    }

    async function handleGesture() {
      if (!blocked || started) return;
      const ok = await doPlay();
      if (!ok) {
        playBtn.style.display = 'inline-block';
        status.textContent = 'Không tự phát được. Bấm nút để phát.';
      }
    }

    playBtn.addEventListener('click', doPlay);
    window.addEventListener('load', tryAutoPlay);
    document.addEventListener('click', handleGesture, true);
    document.addEventListener('touchstart', handleGesture, true);
    document.addEventListener('pointerdown', handleGesture, true);
  </script>
</body>
</html>
